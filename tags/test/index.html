    function updateTime() {
        var now = new Date();

        var month = now.getMonth() + 1;
        var day = now.getDate();
        var hour = now.getHours();
        var minute = now.getMinutes();

        hour = hour < 10 ? '0' + hour : hour;
        minute = minute < 10 ? '0' + minute : minute;
        second = second < 10 ? '0' + second : second;
        
        var timeString = year + '-' + month + '-' + day + ' ' + hour + ':' + minute + ':' + second;
        document.getElementById('footer-time').innerHTML = '当前时间：' + timeString;

  <script>
(function() {
  const loader = document.getElementById('page-loader');
  if (!loader) return;

  const fill = loader.querySelector('.progress-fill');
  const percentSpan = document.getElementById('loading-percent');
  if (!fill || !percentSpan) return;

  let completed = false;
  let currentWidth = 0;
  let progressInterval = null;

  function setProgress(widthPercent) {
    if (completed) return;
    widthPercent = Math.min(widthPercent, 99);
    currentWidth = widthPercent;
    fill.style.width = currentWidth + '%';
    percentSpan.innerText = Math.floor(currentWidth) + '%';
  }

  function updateProgress() {
    if (completed) return;

    let step = 0;
    if (currentWidth < 70) {
      step = Math.floor(Math.random() * 5) + 4;
    } else if (currentWidth < 90) {
      step = Math.floor(Math.random() * 3) + 2;
    } else if (currentWidth < 98) {
      step = 1;
    } else {
      return;
    }

    let newWidth = Math.min(currentWidth + step, 99);
    if (newWidth !== currentWidth) {
      setProgress(newWidth);
    }
  }

  function completeLoading() {
    if (completed) return;
    completed = true;

    if (progressInterval) {
      clearInterval(progressInterval);
      progressInterval = null;
    }

    if (fill) fill.style.width = '100%';
    if (percentSpan) percentSpan.innerText = '100%';

    setTimeout(() => {
      if (loader) loader.classList.add('hidden');
    }, 320);
  }

  progressInterval = setInterval(() => {
    updateProgress();
  }, 120);

  window.addEventListener('load', completeLoading);
  setTimeout(completeLoading, 5000);
})();
</script>
