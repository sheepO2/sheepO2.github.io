          sessionStorage.setItem('random-bg', bg);

        document.addEventListener("DOMContentLoaded", function () {

          const banner =
            document.querySelector('#banner') ||
            document.querySelector('.banner') ||
            document.querySelector('.banner-img');

  <script>
    (function() {
      var footerTime = document.getElementById('footer-time');

      function updateTime() {
        if (!footerTime) return;

        var now = new Date();
        var parts = [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, '0'),
          String(now.getDate()).padStart(2, '0')
        ];
        var clock = [
          String(now.getHours()).padStart(2, '0'),
          String(now.getMinutes()).padStart(2, '0'),
          String(now.getSeconds()).padStart(2, '0')
        ];

        footerTime.textContent = '当前时间: ' + parts.join('-') + ' ' + clock.join(':');
      }

      updateTime();
      setInterval(updateTime, 1000);
    })();
  </script>

      jQuery('#toc-body').off('click.tocToggle').on('click.tocToggle', '.toc-toggle', function(e) {
        e.preventDefault();
        e.stopPropagation();
        var $li = jQuery(this).parent('.toc-list-item');
        var $childList = $li.children('ol');
        if ($childList.length === 0) { return; }
        $childList.toggleClass('tocbot-is-collapsed');
        updateTocToggle($li, $childList);
      });
      if (!window.__tocToggleObserver) {
        window.__tocToggleObserver = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type !== 'attributes' || mutation.attributeName !== 'class') { return; }
            var $list = jQuery(mutation.target);
            var $li = $list.parent('.toc-list-item');
            if ($li.length === 0) { return; }
            updateTocToggle($li, $list);
          });
        });
        jQuery('#toc-body ol').each(function() {
          window.__tocToggleObserver.observe(this, { attributes: true });
        });
      }
    }
    var tocConfig = Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc);
    if (isExpandAllEnabled()) {
      tocConfig.collapseDepth = 6;
    }
    window.tocbot.init(tocConfig);
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }
    expandAllToc();
    bindTocToggle();

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
        expandAllToc();
        bindTocToggle();
      }
    });
  });
</script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        if (!location.pathname.startsWith('/music')) return;

        const targets = [
          document.querySelector('.markdown-body'),
          document.querySelector('.post'),
          document.querySelector('.article'),
          document.querySelector('#board')
        ];

        const target = targets.find(Boolean);
        if (!target || document.getElementById('music-page-shell')) return;

        const customMusicApi = "https://sheepo2-meting-api.sheep-o2.workers.dev/api/meting?server=:server&type=:type&id=:id&r=:r";
        const shell = document.createElement('section');
        shell.id = 'music-page-shell';
        shell.style.margin = '20px 0';

        shell.innerHTML = `
          <div id="music-player-wrap">
            <div id="music-player-placeholder">Loading music player...</div>
          </div>

          <div id="giscus-container" style="margin-top:30px;"></div>
        `;

        target.prepend(shell);

        const giscusScript = document.createElement('script');
        giscusScript.src = 'https://giscus.app/client.js';
        giscusScript.setAttribute('data-repo', 'sheepO2/sheepO2.github.io');
        giscusScript.setAttribute('data-repo-id', 'R_kgDORpKDVg');
        giscusScript.setAttribute('data-category', 'General');
        giscusScript.setAttribute('data-category-id', 'DIC_kwDORpKDVs4C41AR');
        giscusScript.setAttribute('data-mapping', 'pathname');
        giscusScript.setAttribute('data-theme', 'preferred_color_scheme');
        giscusScript.setAttribute('data-lang', 'zh-CN');
        giscusScript.crossOrigin = 'anonymous';
        giscusScript.async = true;
        document.getElementById('giscus-container').appendChild(giscusScript);

        initMusicPlayer(customMusicApi);
      });

      function buildMetingMarkup(api) {
        const apiAttr = api ? ' api="' + api + '"' : '';
        return `
          <meting-js${apiAttr}
            server="netease"
            type="playlist"
            id="13942358671"
            fixed="false"
            autoplay="false"
            order="random"
            preload="auto"
            volume="0.7">
          </meting-js>
        `;
      }

      function renderMetingPlayer(api) {
        const wrap = document.getElementById('music-player-wrap');
        if (!wrap) return;
        wrap.innerHTML = buildMetingMarkup(api);
      }

      async function initMusicPlayer(customApi) {
        if (!customApi) {
          renderMetingPlayer('');
          return;
        }

        try {
          const probeUrl = customApi
            .replace(':server', 'netease')
            .replace(':type', 'playlist')
            .replace(':id', '13942358671')
            .replace(':r', Math.random().toString(36).slice(2));
          const controller = new AbortController();
          const timer = window.setTimeout(function() {
            controller.abort();
          }, 2500);

          const res = await fetch(probeUrl, {
            method: 'GET',
            mode: 'cors',
            signal: controller.signal
          });

          window.clearTimeout(timer);

          if (res.ok) {
            const data = await res.json();
            if (Array.isArray(data) && data.length > 0) {
              renderMetingPlayer(customApi);
              return;
            }
          }

          renderMetingPlayer('');
        } catch (error) {
          renderMetingPlayer('');
        }
      }
    </script>
