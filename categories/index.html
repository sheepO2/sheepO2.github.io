  <script>
    (function() {
      var footerTime = document.getElementById('footer-time');

      function updateTime() {
        if (!footerTime) return;

        var now = new Date();
        var parts = [
          now.getFullYear(),
          String(now.getMonth() + 1).padStart(2, '0'),
          String(now.getDate()).padStart(2, '0')
        ];
        var clock = [
          String(now.getHours()).padStart(2, '0'),
          String(now.getMinutes()).padStart(2, '0'),
          String(now.getSeconds()).padStart(2, '0')
        ];

        footerTime.textContent = '当前时间: ' + parts.join('-') + ' ' + clock.join(':');
      }

      updateTime();
      setInterval(updateTime, 1000);
    })();
  </script>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        if (!location.pathname.startsWith('/music')) return;

        const targets = [
          document.querySelector('.markdown-body'),
          document.querySelector('.post'),
          document.querySelector('.article'),
          document.querySelector('#board')
        ];

        const target = targets.find(Boolean);
        if (!target || document.getElementById('music-page-shell')) return;

        const customMusicApi = "https://sheepo2-meting-api.sheep-o2.workers.dev/api/meting?server=:server&type=:type&id=:id&r=:r";
        const shell = document.createElement('section');
        shell.id = 'music-page-shell';
        shell.style.margin = '20px 0';

        shell.innerHTML = `
          <div id="music-player-wrap">
            <div id="music-player-placeholder">Loading music player...</div>
          </div>

          <div id="giscus-container" style="margin-top:30px;"></div>
        `;

        target.prepend(shell);

        const giscusScript = document.createElement('script');
        giscusScript.src = 'https://giscus.app/client.js';
        giscusScript.setAttribute('data-repo', 'sheepO2/sheepO2.github.io');
        giscusScript.setAttribute('data-repo-id', 'R_kgDORpKDVg');
        giscusScript.setAttribute('data-category', 'General');
        giscusScript.setAttribute('data-category-id', 'DIC_kwDORpKDVs4C41AR');
        giscusScript.setAttribute('data-mapping', 'pathname');
        giscusScript.setAttribute('data-theme', 'preferred_color_scheme');
        giscusScript.setAttribute('data-lang', 'zh-CN');
        giscusScript.crossOrigin = 'anonymous';
        giscusScript.async = true;
        document.getElementById('giscus-container').appendChild(giscusScript);

        initMusicPlayer(customMusicApi);
      });

      function buildMetingMarkup(api) {
        const apiAttr = api ? ' api="' + api + '"' : '';
        return `
          <meting-js${apiAttr}
            server="netease"
            type="playlist"
            id="13942358671"
            fixed="false"
            autoplay="false"
            order="random"
            preload="auto"
            volume="0.7">
          </meting-js>
        `;
      }

      function renderMetingPlayer(api) {
        const wrap = document.getElementById('music-player-wrap');
        if (!wrap) return;
        wrap.innerHTML = buildMetingMarkup(api);
      }

      async function initMusicPlayer(customApi) {
        if (!customApi) {
          renderMetingPlayer('');
          return;
        }

        try {
          const endpoint = new URL(customApi);
          const healthUrl = endpoint.origin + '/health';
          const controller = new AbortController();
          const timer = window.setTimeout(function() {
            controller.abort();
          }, 2500);

          const res = await fetch(healthUrl, {
            method: 'GET',
            mode: 'cors',
            signal: controller.signal
          });

          window.clearTimeout(timer);

          if (res.ok) {
            renderMetingPlayer(customApi);
          } else {
            renderMetingPlayer('');
          }
        } catch (error) {
          renderMetingPlayer('');
        }
      }
    </script>
